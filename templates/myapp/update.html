<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body bgcolor="yellow">
	<center>
		<h1>Updation Form</h1>
		<form method="Post">
			<h1>Name: <input type="text" name="name" value="{{stud.name}}"> </h1>
			<h1>Age: <input type="number" name="age" value="{{stud.age}}"> </h1>
			<h1>Place: <input type="text" name="place" value="{{stud.place}}"> </h1>
			<h1>Email: <input type="email" name="email" value="{{stud.email}}"> </h1>
              {% csrf_token %}
              <button>Submit</button>
			
		</form>
			
	</center>

</body>
</html>
